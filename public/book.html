<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#E5DDD4"/>
<title>JAI CHAN SPA — Book Your Treatment</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream-50:#FDFAF7;
  --cream-100:#F5EDE4;
  --cream-200:#E5DDD4;
  --cream-300:#D4C9BB;
  --dark:#1C150D;
  --brown:#7A4E30;
  --terracotta:#96583A;
  --gold:#C9A26D;
  --muted:#9E856F;
  --border:#DDD5C8;
  --font-display:'Josefin Sans',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
}
html,body{height:100%;background:var(--cream-100);color:var(--dark);font-family:var(--font-body);font-size:14px;-webkit-font-smoothing:antialiased}
/* ── Layout ── */
.page{min-height:100vh;display:flex;flex-direction:column}
header{background:var(--cream-200);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
main{flex:1;padding:20px 16px 40px;max-width:520px;margin:0 auto;width:100%}

/* ── Logo ── */
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-wordmark{font-family:var(--font-display);font-weight:600;font-size:13px;letter-spacing:0.35em;text-transform:uppercase;color:var(--dark)}
.logo-sub{font-family:var(--font-display);font-weight:300;font-size:7px;letter-spacing:0.4em;text-transform:uppercase;color:var(--terracotta);margin-top:2px}

/* ── Lang switcher ── */
.lang-switch{display:flex;border:1px solid var(--border)}
.lang-btn{background:none;border:none;padding:6px 10px;font-family:var(--font-display);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;color:var(--muted);transition:all .15s}
.lang-btn.active{background:var(--dark);color:var(--cream-50)}
.lang-btn:hover:not(.active){background:var(--cream-200);color:var(--dark)}

/* ── Progress ── */
.progress{background:var(--cream-50);border-bottom:1px solid var(--border);padding:14px 16px}
.progress-inner{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:6px}
.step-item{display:flex;align-items:center;gap:6px;flex:1}
.step-num{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:10px;font-weight:600;flex-shrink:0;transition:all .2s}
.step-num.done{background:var(--terracotta);color:var(--cream-50)}
.step-num.active{background:var(--dark);color:var(--cream-50)}
.step-num.todo{background:var(--cream-300);color:var(--muted)}
.step-label{font-family:var(--font-display);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;display:none;white-space:nowrap}
@media(min-width:400px){.step-label{display:block}}
.step-label.active{color:var(--dark);font-weight:600}
.step-label.todo{color:var(--muted)}
.step-line{height:1px;flex:1;background:var(--border);transition:background .2s}
.step-line.done{background:var(--terracotta)}

/* ── Card ── */
.card{background:var(--cream-50);border:1px solid var(--border);padding:20px}
.card-title{font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--brown);margin-bottom:18px}

/* ── Category tabs ── */
.cats{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:16px}
.cat-btn{background:none;border:1px solid var(--border);padding:5px 12px;font-family:var(--font-display);font-size:9px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;color:var(--muted);transition:all .15s}
.cat-btn.active{background:var(--terracotta);color:var(--cream-50);border-color:var(--terracotta)}
.cat-btn:hover:not(.active){border-color:var(--brown);color:var(--brown)}

/* ── Service cards ── */
.service-list{display:flex;flex-direction:column;gap:10px}
.svc-card{border:1px solid var(--border);background:var(--cream-50);padding:14px;cursor:pointer;transition:all .2s}
.svc-card.selected{border-color:var(--terracotta);background:var(--cream-200)}
.svc-card:hover:not(.selected){border-color:var(--brown)}
.svc-name{font-family:var(--font-display);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--dark);margin-bottom:4px}
.svc-card.selected .svc-name{color:var(--terracotta)}
.svc-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.dur-list{display:flex;flex-wrap:wrap;gap:6px}
.dur-btn{background:white;border:1px solid var(--border);padding:5px 10px;font-family:var(--font-display);font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;color:var(--brown);transition:all .15s}
.dur-btn.active{background:var(--dark);color:var(--cream-50);border-color:var(--dark)}
.dur-btn:hover:not(.active){border-color:var(--dark)}

/* ── Loading ── */
.loading{text-align:center;padding:40px;font-family:var(--font-display);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)}

/* ── Step 2: Date/time ── */
.selected-summary{background:var(--cream-200);border:1px solid var(--border);padding:12px 14px;margin-bottom:16px}
.sum-label{font-family:var(--font-display);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.sum-name{font-size:12px;font-weight:500;color:var(--dark)}
.sum-detail{font-size:11px;color:var(--brown);margin-top:2px;letter-spacing:0.05em}

label.field-label{display:block;font-family:var(--font-display);font-size:9px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:14px}
input[type=date],select,input[type=tel],input[type=text]{width:100%;border:1px solid var(--border);background:var(--cream-50);color:var(--dark);padding:10px 12px;font-family:var(--font-body);font-size:13px;outline:none;transition:border .15s;-webkit-appearance:none;border-radius:0}
input[type=date]:focus,select:focus,input[type=tel]:focus,input[type=text]:focus{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.field-hint{font-size:10px;color:var(--muted);margin-top:4px}
.field-error{font-size:10px;color:#b91c1c;margin-top:4px;display:none}
.field-error.show{display:block}

.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}
@media(min-width:380px){.time-grid{grid-template-columns:repeat(5,1fr)}}
.time-btn{border:1px solid var(--border);background:var(--cream-50);padding:8px 4px;font-family:var(--font-display);font-size:10px;letter-spacing:0.05em;cursor:pointer;color:var(--brown);transition:all .15s;text-align:center}
.time-btn.active{background:var(--dark);color:var(--cream-50);border-color:var(--dark)}
.time-btn:hover:not(.active){border-color:var(--brown)}

/* ── Step 3: Customer form ── */
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.line-notice{background:var(--cream-200);border:1px solid var(--border);padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--brown)}

/* ── Step 4: Review ── */
.review-table{background:var(--cream-200);border:1px solid var(--border);padding:16px}
.review-row{display:flex;justify-content:space-between;gap:12px;padding:5px 0}
.review-row:not(:last-child){border-bottom:1px solid var(--border)}
.review-key{font-family:var(--font-display);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);flex-shrink:0;padding-top:1px}
.review-val{font-size:11px;font-weight:500;color:var(--dark);text-align:right}
.review-note{text-align:center;font-family:var(--font-display);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-top:12px}

/* ── Navigation ── */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 20px;font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:var(--terracotta);color:var(--cream-50)}
.btn-primary:hover:not(:disabled){background:var(--brown)}
.btn-secondary{background:transparent;color:var(--dark);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){background:var(--cream-200)}
.btn-submit{background:var(--terracotta);color:var(--cream-50);min-width:200px;justify-content:center}
.btn-submit:hover:not(:disabled){background:var(--brown)}
.btn-invisible{visibility:hidden}

/* ── Success ── */
.success-screen{text-align:center;padding:40px 20px}
.success-icon{width:56px;height:56px;background:var(--terracotta);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.success-icon svg{display:block}
.success-title{font-family:var(--font-display);font-size:14px;letter-spacing:0.3em;text-transform:uppercase;color:var(--dark);margin-bottom:8px}
.success-code{font-family:var(--font-display);font-size:22px;font-weight:600;letter-spacing:0.2em;color:var(--terracotta);margin:12px 0}
.success-msg{font-size:12px;color:var(--muted);line-height:1.7;max-width:300px;margin:0 auto}

/* ── Error toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--cream-50);padding:10px 18px;font-size:11px;font-family:var(--font-display);letter-spacing:0.1em;z-index:999;display:none;max-width:320px;text-align:center}
.toast.show{display:block}
</style>
</head>
<body>
<div class="page">

<!-- Header -->
<header>
  <div class="logo">
    <!-- JAI CHAN exact logo mark — 4-petal pinwheel, warm tan -->
    <svg class="logo-mark" width="30" height="30" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Top-left petal -->
      <path d="M60 60 C55 45, 40 25, 25 20 C12 16, 5 28, 12 40 C18 50, 38 55, 60 60Z" fill="#B09A88"/>

      <path d="M60 60 C75 55, 95 40, 100 25 C104 12, 92 5, 80 12 C70 18, 65 38, 60 60Z" fill="#B09A88"/>

    <button class="lang-btn" data-lang="cn" onclick="setLang('cn')">🇨🇳 中文</button>

</header>

<!-- Progress bar -->

</div>

<!-- Main content -->

    </div>

  <!-- Step 3: Customer Info -->

    <div class="card">

      <div class="line-notice" id="lineNotice" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" fill="#06C755"/></svg>

      </div>
      <div class="name-row">
        <div>

          <input type="text" id="firstName" placeholder=""/>

        </div>
        <div>
          <label class="field-label" data-i18n="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder=""/>
          <div class="field-error" id="err-lastName" data-i18n="required">Required</div>
        </div>
      </div>
      <label class="field-label" data-i18n="nationality">Nationality</label>
      <select id="nationality">
        <option value="">—</option>
        <option value="Thai">Thai / ไทย</option>
        <option value="Chinese">Chinese / 中国</option>
        <option value="Japanese">Japanese / 日本</option>
        <option value="Korean">Korean / 한국</option>
        <option value="American">American</option>

        <option value="Australian">Australian</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Indian">Indian</option>
        <option value="Russian">Russian</option>
        <option value="Singaporean">Singaporean</option>
        <option value="Malaysian">Malaysian</option>
        <option value="Filipino">Filipino</option>
        <option value="Indonesian">Indonesian</option>
        <option value="Vietnamese">Vietnamese</option>
        <option value="Taiwanese">Taiwanese</option>
        <option value="Other">Other</option>
      </select>
      <div class="field-error" id="err-nationality" data-i18n="required">Required</div>
      <label class="field-label" data-i18n="phone">Phone Number</label>
      <input type="tel" id="phone" placeholder="+66 XX XXX XXXX"/>
      <div class="field-hint">+66, +86, +81, +82, +1…</div>
      <div class="field-error" id="err-phone" data-i18n="required">Required</div>
    </div>
  </div>

  <!-- Step 4: Review -->
  <div id="step4" class="step-view" style="display:none">
    <div class="card">
      <div class="card-title" data-i18n="reviewSubmit">Review &amp; Submit</div>
      <div class="review-table" id="reviewTable"></div>
      <div class="review-note" id="reviewNote"></div>
    </div>
  </div>

  <!-- Success -->
  <div id="stepSuccess" class="step-view" style="display:none">
    <div class="success-screen">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>
        </svg>
      </div>
      <div class="success-title" id="successTitle">Booking Received</div>
      <div class="success-code" id="successCode"></div>
      <div class="success-msg" id="successMsg"></div>
    </div>
  </div>

  <!-- Navigation buttons -->
  <div class="nav" id="navBar">
    <button class="btn btn-secondary btn-invisible" id="btnBack" onclick="goBack()">&#8249; <span data-i18n="back">Back</span></button>
    <button class="btn btn-primary" id="btnNext" onclick="goNext()" disabled>
      <span data-i18n="next">Next</span> &#8250;
    </button>
    <button class="btn btn-submit" id="btnSubmit" onclick="submitBooking()" style="display:none">
      <span id="submitLabel" data-i18n="submit">Submit Booking Request</span>
    </button>
  </div>
</main>
</div>

<div class="toast" id="toast"></div>

  document.getElementById('dateInput').min = today;

  // Try LIFF
  if (LIFF_ID && window.liff) {
    liff.init({liffId: LIFF_ID}).then(() => {
      if (liff.isLoggedIn()) {
        liff.getProfile().then(p => {
          lineProfile = {userId: p.userId, displayName: p.displayName, pictureUrl: p.pictureUrl};
          const ll = liff.getLanguage?.() ?? 'en';
          if (ll.startsWith('th')) setLang('th');
          else if (ll.startsWith('zh')) setLang('cn');
          showLineNotice();
        });
      }
    }).catch(()=>{});
  }

  await loadServices();
  render();
});

// ── Load services from Supabase ──
async function loadServices() {
  if (!sb) { services = STATIC_SERVICES; return; }
  const {data, error} = await sb.from('services').select('*').eq('is_active', true).order('sort_order');
  if (error || !data || data.length === 0) { services = STATIC_SERVICES; }
  else { services = data; }
}

// ── Language ──
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  render();
}

function tr(key) { return (TR[lang] || TR.en)[key] || key; }

function getName(s) {
  if (lang === 'th') return s.name_th;
  if (lang === 'cn') return s.name_cn;
  return s.name_en;
}
function getDesc(s) {
  if (lang === 'th') return s.description_th;
  if (lang === 'cn') return s.description_cn;
  return s.description_en;
}

// ── Progress bar ──
const STEP_KEYS = ['selectService','selectDateTime','yourInfo','reviewSubmit'];
function renderProgress() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  STEP_KEYS.forEach((key, i) => {
    const s = i + 1;
    const state = s < step ? 'done' : s === step ? 'active' : 'todo';
    const numEl = `<div class="step-num ${state}">${state==='done'?'✓':s}</div>`;
    const labelEl = `<span class="step-label ${state==='active'?'active':'todo'}">${tr(key)}</span>`;
    const item = document.createElement('div');
    item.className = 'step-item';
    item.innerHTML = numEl + labelEl;
    bar.appendChild(item);
    if (i < STEP_KEYS.length - 1) {
      const line = document.createElement('div');
      line.className = 'step-line' + (state === 'done' ? ' done' : '');
      bar.appendChild(line);
    }
  });
}

// ── Step 1: Services ──
const CATS = ['all','signatures','siam_touch','beauty','packages'];
function renderStep1() {
  // Category tabs
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = CATS.map(c =>
    `<button class="cat-btn${activeCategory===c?' active':''}" onclick="setCategory('${c}')">${tr(c)}</button>`
  ).join('');

  // Service list
  const list = document.getElementById('serviceList');
  const filtered = activeCategory === 'all' ? services : services.filter(s => s.category === activeCategory);
  if (!filtered.length) { list.innerHTML = `<div class="loading">${tr('loading')}</div>`; return; }

  list.innerHTML = filtered.map(s => {
    const isSelected = selectedService?.service.id === s.id;
    const durs = Array.isArray(s.durations) ? s.durations : JSON.parse(s.durations || '[]');
    const durBtns = durs.map(d => {
      const isActiveDur = isSelected && selectedService?.minutes === d.minutes;
      return `<button class="dur-btn${isActiveDur?' active':''}" onclick="selectDuration(event,'${s.id}',${d.minutes},${d.price})">${d.minutes} ${tr('mins')} · ${fmtPrice(d.price)}</button>`;
    }).join('');
    return `<div class="svc-card${isSelected?' selected':''}" id="svc-${s.id}">
      <div class="svc-name">${getName(s)}</div>
      <div class="svc-desc">${getDesc(s)||''}</div>
      <div class="dur-list">${durBtns}</div>
    </div>`;
  }).join('');
}

function setCategory(c) { activeCategory = c; renderStep1(); }

function selectDuration(e, svcId, minutes, price) {
  e.stopPropagation();
  const svc = services.find(s => s.id === svcId);
  if (!svc) return;
  selectedService = {service: svc, minutes, price};
  renderStep1();
  updateNav();
}

// ── Step 2: Date/Time ──
function renderStep2() {
  if (!selectedService) return;
  const durs = Array.isArray(selectedService.service.durations) ? selectedService.service.durations : JSON.parse(selectedService.service.durations || '[]');
  document.getElementById('step2Summary').innerHTML =
    `<div class="sum-label">${tr('service')}</div>
     <div class="sum-name">${getName(selectedService.service)}</div>
     <div class="sum-detail">${selectedService.minutes} ${tr('mins')} · ${fmtPrice(selectedService.price)}</div>`;
  document.getElementById('dateInput').value = selectedDate;
  if (selectedDate) renderTimeSlots();
}

function onDateChange() {
  selectedDate = document.getElementById('dateInput').value;
  selectedTime = '';
  renderTimeSlots();
  updateNav();
}

function renderTimeSlots() {
  const section = document.getElementById('timeSection');
  const grid = document.getElementById('timeGrid');
  if (!selectedDate) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  const slots = generateSlots(selectedService?.minutes || 60);
  grid.innerHTML = slots.map(t =>
    `<button class="time-btn${selectedTime===t?' active':''}" onclick="selectTime('${t}')">${t}</button>`
  ).join('');
}

function selectTime(t) {
  selectedTime = t;
  renderTimeSlots();
  updateNav();
}

function generateSlots(dur) {
  const slots = [];
  const open = 10 * 60, close = 22 * 60;
  for (let m = open; m + dur <= close; m += 30) {
    slots.push(`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`);
  }
  return slots;
}

// ── Step 3: Customer form ──
function showLineNotice() {
  if (!lineProfile) return;
  const notice = document.getElementById('lineNotice');
  const txt = document.getElementById('lineNoticeTxt');
  txt.textContent = `${tr('lineConnected')} ${lineProfile.displayName}`;
  notice.style.display = 'flex';
}

function renderStep3() { showLineNotice(); }

function validateStep3() {
  const fields = ['firstName','lastName','nationality','phone'];
  let ok = true;
  fields.forEach(f => {
    const val = document.getElementById(f).value.trim();
    const err = document.getElementById('err-'+f);
    if (!val) { err.classList.add('show'); ok = false; }
    else { err.classList.remove('show'); }
  });
  return ok;
}

// ── Step 4: Review ──
function renderStep4() {
  const t = {
    [tr('service')]: getName(selectedService.service),
    [tr('duration')]: `${selectedService.minutes} ${tr('mins')}`,
    [tr('price')]: fmtPrice(selectedService.price),
    [tr('date')]: fmtDate(selectedDate),
    [tr('time')]: `${selectedTime} (${selectedService.minutes} ${tr('mins')})`,
    [tr('customer')]: `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`,
    [tr('nationality')]: document.getElementById('nationality').value,
    [tr('phone')]: document.getElementById('phone').value,
  };
  document.getElementById('reviewTable').innerHTML =
    Object.entries(t).map(([k,v]) =>
      `<div class="review-row"><span class="review-key">${k}</span><span class="review-val">${v}</span></div>`
    ).join('');
  document.getElementById('reviewNote').textContent = tr('notifyLine');
}

// ── Submit ──
async function submitBooking() {
  if (submitting) return;
  submitting = true;
  const label = document.getElementById('submitLabel');
  label.textContent = tr('submitting');
  document.getElementById('btnSubmit').disabled = true;

  const payload = {
    service_id: selectedService.service.id,
    duration_minutes: selectedService.minutes,
    price: selectedService.price,
    requested_date: selectedDate,
    requested_time: selectedTime,
    first_name: document.getElementById('firstName').value.trim(),
    last_name: document.getElementById('lastName').value.trim(),
    nationality: document.getElementById('nationality').value,
    phone: document.getElementById('phone').value.trim(),
    preferred_language: lang,
    ...(lineProfile && {
      line_user_id: lineProfile.userId,
      line_display_name: lineProfile.displayName,
      line_picture_url: lineProfile.pictureUrl,
    })
  };

  try {
    let bookingCode;
    if (sb) {
      // Upsert customer
      let customerId = null;
      if (payload.line_user_id) {
        const {data: existing} = await sb.from('customers').select('id').eq('line_user_id', payload.line_user_id).single();
        if (existing) {
          await sb.from('customers').update({first_name: payload.first_name, last_name: payload.last_name, nationality: payload.nationality, phone: payload.phone, preferred_language: payload.preferred_language}).eq('id', existing.id);
          customerId = existing.id;
        }
      }
      if (!customerId) {
        const {data: c} = await sb.from('customers').insert({first_name: payload.first_name, last_name: payload.last_name, nationality: payload.nationality, phone: payload.phone, preferred_language: payload.preferred_language, line_user_id: payload.line_user_id || null, line_display_name: payload.line_display_name || null}).select('id').single();
        customerId = c?.id;
      }
      // Insert booking
      const {data: booking, error} = await sb.from('bookings').insert({
        customer_id: customerId,
        service_id: payload.service_id,
        duration_minutes: payload.duration_minutes,
        price: payload.price,
        requested_date: payload.requested_date,
        requested_time: payload.requested_time + ':00',
        booking_code: '',
      }).select('booking_code').single();
      if (error) throw error;
      bookingCode = booking.booking_code;
    } else {
      // Offline fallback code
      bookingCode = 'JC-' + Math.random().toString(36).substr(2,6).toUpperCase();
    }

    // Show success
    document.getElementById('successTitle').textContent = tr('bookingReceived');
    document.getElementById('successCode').textContent = bookingCode;
    document.getElementById('successMsg').textContent = tr('thankYou');
    showStep('stepSuccess');
    document.getElementById('navBar').style.display = 'none';
    document.querySelector('.progress').style.display = 'none';

  } catch(err) {
    console.error(err);
    showToast('Something went wrong. Please try again.');
    label.textContent = tr('submit');
    document.getElementById('btnSubmit').disabled = false;
    submitting = false;
  }
}

// ── Navigation ──
function canAdvance() {
  if (step === 1) return !!selectedService;
  if (step === 2) return !!selectedDate && !!selectedTime;
  if (step === 3) return true; // validated on click
  return true;
}

function updateNav() {
  const btnNext = document.getElementById('btnNext');
  const btnBack = document.getElementById('btnBack');
  const btnSubmit = document.getElementById('btnSubmit');
  btnNext.disabled = !canAdvance();
  btnBack.style.visibility = step === 1 ? 'hidden' : 'visible';
  btnNext.style.display = step < 4 ? 'inline-flex' : 'none';
  btnSubmit.style.display = step === 4 ? 'inline-flex' : 'none';
}

function goNext() {
  if (step === 3 && !validateStep3()) return;
  if (step < 4) { step++; render(); }
}

function goBack() {
  if (step > 1) { step--; render(); }
}

// ── Render dispatcher ──
function render() {
  renderProgress();
  ['step1','step2','step3','step4','stepSuccess'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  showStep('step' + step);
  if (step === 1) renderStep1();
  if (step === 2) renderStep2();
  if (step === 3) renderStep3();
  if (step === 4) renderStep4();
  updateNav();
  applyI18n();
  window.scrollTo(0,0);
}

function showStep(id) {
  document.getElementById(id).style.display = 'block';
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (TR[lang]?.[key]) el.textContent = TR[lang][key];
  });
}

// ── Helpers ──
function fmtPrice(p) { return Number(p).toLocaleString() + ' THB'; }

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00');
  if (lang === 'th') return dt.toLocaleDateString('th-TH', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  if (lang === 'cn') return dt.toLocaleDateString('zh-CN', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  return dt.toLocaleDateString('en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
